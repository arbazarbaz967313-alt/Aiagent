<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI App Factory</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#0b0f19;
      color:#e2e8f0;
      font-family:'Plus Jakarta Sans',sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px
    }
    .app{
      max-width:620px;
      width:100%;
      background:#131a2b;
      border:1px solid #1e293b;
      border-radius:24px;
      padding:32px 28px;
      box-shadow:0 25px 50px -12px rgba(0,0,0,.5)
    }
    .header{text-align:center;margin-bottom:28px}
    .header .icon{font-size:48px;margin-bottom:12px}
    .header h1{
      font-size:2rem;
      font-weight:800;
      background:linear-gradient(135deg,#a78bfa,#60a5fa);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent
    }
    .header p{color:#64748b;font-size:.85rem}

    .pipeline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:#0f172a;
      border-radius:14px;
      padding:14px 12px;
      margin-bottom:20px;
      gap:2px;
      flex-wrap:wrap
    }
    .step{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      font-size:.6rem;
      color:#475569;
      transition:.2s;
      flex:1;
      text-align:center
    }
    .step .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#334155;
      transition:.3s
    }
    .step.done .dot{background:#10b981;box-shadow:0 0 10px #10b981}
    .step.active .dot{background:#f59e0b;box-shadow:0 0 10px #f59e0b;animation:pulse .8s infinite}
    .step.error .dot{background:#ef4444;box-shadow:0 0 10px #ef4444}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    .error-box{
      display:none;
      background:#1e0a0a;
      border:1px solid #ef4444;
      border-radius:12px;
      padding:14px 18px;
      margin-bottom:16px;
      color:#fca5a5;
      font-size:.8rem
    }
    .error-box strong{color:#ef4444}

    .output{
      background:#0f172a;
      border-radius:14px;
      padding:18px;
      margin-bottom:20px;
      display:none
    }
    .output h3{color:#a78bfa;margin-bottom:12px;font-size:.95rem}
    .output p{font-size:.82rem;margin-bottom:6px}
    .output a{color:#60a5fa;text-decoration:none;font-weight:600}

    .btn{
      width:100%;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      color:#fff;
      border:none;
      padding:14px;
      border-radius:14px;
      font-weight:700;
      font-size:1rem;
      cursor:pointer;
      transition:.2s;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px
    }
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn:hover:not(:disabled){filter:brightness(1.1)}

    .status-text{
      text-align:center;
      margin-top:12px;
      font-size:.75rem;
      color:#64748b;
      min-height:20px
    }

    .log{
      margin-top:14px;
      background:#0f172a;
      border-radius:12px;
      padding:12px 14px;
      font-size:.7rem;
      font-family:monospace;
      color:#64748b;
      max-height:140px;
      overflow-y:auto
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="icon">⚡</div>
      <h1>AI App Factory</h1>
      <p>Daily Flutter apps — idea to APK automatically</p>
    </div>

    <div class="pipeline" id="pipeline">
      <div class="step" id="step-idea"><span class="dot"></span>Idea</div>
      <div class="step" id="step-code"><span class="dot"></span>Code</div>
      <div class="step" id="step-upload"><span class="dot"></span>GitHub</div>
      <div class="step" id="step-build"><span class="dot"></span>Build</div>
      <div class="step" id="step-email"><span class="dot"></span>Email</div>
    </div>

    <div class="error-box" id="error-box">
      <strong>❌ Error:</strong> <span id="error-msg"></span>
    </div>

    <div class="output" id="output">
      <h3>📱 Latest App</h3>
      <p><strong>Name:</strong> <span id="out-name">-</span></p>
      <p><strong>Desc:</strong> <span id="out-desc">-</span></p>
      <p>🔗 <a href="#" target="_blank" id="out-github">GitHub</a> | 📦 <a href="#" target="_blank" id="out-apk">APK</a></p>
    </div>

    <button class="btn" id="btn" onclick="run()">🚀 Generate App</button>
    <div class="status-text" id="status-text">⚫ Ready</div>
    <div class="log" id="log"></div>
  </div>

  <script>
    const API = window.location.origin;
    let timer = null;

    const stepNames = ['idea','code','github','build','email'];
    const stepIds = ['step-idea','step-code','step-upload','step-build','step-email'];

    async function run(){
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.innerHTML = '⏳ Running...';
      document.getElementById('error-box').style.display = 'none';
      document.getElementById('status-text').textContent = '⚡ Pipeline starting...';
      document.getElementById('log').innerHTML = '';

      try{
        await fetch(API + '/run');
        poll();
      }catch(e){
        showError('Server connect nahi ho paya: ' + e.message);
        btn.disabled = false;
        btn.innerHTML = '🚀 Generate App';
      }
    }

    function showError(msg){
      const box = document.getElementById('error-box');
      box.style.display = 'block';
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('status-text').textContent = '❌ Failed';
    }

    async function poll(){
      try{
        const r = await fetch(API + '/status');
        const d = await r.json();

        // Update pipeline dots
        stepNames.forEach((s,i) => {
          const el = document.getElementById(stepIds[i]);
          if(!el) return;
          el.classList.remove('done','active','error');
          if(d[s]?.status === 'done') el.classList.add('done');
          if(d[s]?.status === 'running') el.classList.add('active');
          if(d[s]?.status === 'error') el.classList.add('error');
        });

        // Update status text
        const runningStep = stepNames.find(s => d[s]?.status === 'running');
        const errorStep = stepNames.find(s => d[s]?.status === 'error');
        
        if(errorStep){
          document.getElementById('status-text').textContent = `❌ Failed at: ${errorStep.toUpperCase()}`;
        }else if(runningStep){
          document.getElementById('status-text').textContent = `🔄 Running: ${runningStep.toUpperCase()}...`;
        }else if(d.complete){
          document.getElementById('status-text').textContent = '✅ All done!';
        }

        // Show app info
        if(d.app){
          document.getElementById('output').style.display = 'block';
          document.getElementById('out-name').textContent = d.app.name;
          document.getElementById('out-desc').textContent = d.app.desc;
          document.getElementById('out-github').href = d.app.githubUrl;
          document.getElementById('out-apk').href = d.app.apkUrl;
        }

        // Show logs
        if(d.logs?.length){
          document.getElementById('log').innerHTML = d.logs
            .map(l => {
              const icon = l.type === 'error' ? '❌' : l.type === 'success' ? '✅' : 'ℹ️';
              return `${icon} [${new Date(l.time).toLocaleTimeString()}] ${l.message}`;
            })
            .join('<br>');
        }

        // Check for errors in logs
        const lastError = d.logs?.find(l => l.type === 'error');
        if(lastError){
          showError(lastError.message);
        }

        if(!d.complete){
          timer = setTimeout(poll, 3000);
        }else{
          document.getElementById('btn').disabled = false;
          document.getElementById('btn').innerHTML = '🚀 Generate App';
        }
      }catch(e){
        // Silent retry
        timer = setTimeout(poll, 5000);
      }
    }

    poll();
  </script>
</body>
</html>
