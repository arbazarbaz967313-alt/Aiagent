<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI App Factory</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#0b0f19;
      color:#e2e8f0;
      font-family:'Plus Jakarta Sans',sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px
    }
    .app{
      max-width:600px;
      width:100%;
      background:#131a2b;
      border:1px solid #1e293b;
      border-radius:24px;
      padding:32px 28px;
      box-shadow:0 25px 50px -12px rgba(0,0,0,.5)
    }
    .header{text-align:center;margin-bottom:32px}
    .header .icon{font-size:48px;margin-bottom:12px}
    .header h1{
      font-size:2rem;
      font-weight:800;
      background:linear-gradient(135deg,#a78bfa,#60a5fa);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent
    }
    .header p{color:#64748b;font-size:.85rem}
    
    .pipeline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:#0f172a;
      border-radius:14px;
      padding:14px 16px;
      margin-bottom:20px;
      gap:2px;
      flex-wrap:wrap
    }
    .step{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      font-size:.65rem;
      color:#475569;
      transition:.2s;
      flex:1
    }
    .step .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#334155;
      transition:.3s
    }
    .step.done .dot{background:#10b981;box-shadow:0 0 10px #10b981}
    .step.active .dot{background:#f59e0b;box-shadow:0 0 10px #f59e0b;animation:pulse .8s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    .output{
      background:#0f172a;
      border-radius:14px;
      padding:18px;
      margin-bottom:20px;
      display:none
    }
    .output h3{color:#a78bfa;margin-bottom:12px;font-size:.95rem}
    .output p{font-size:.82rem;margin-bottom:6px}
    .output a{color:#60a5fa;text-decoration:none;font-weight:600}

    .btn{
      width:100%;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      color:#fff;
      border:none;
      padding:14px;
      border-radius:14px;
      font-weight:700;
      font-size:1rem;
      cursor:pointer;
      transition:.2s;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px
    }
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn:hover:not(:disabled){filter:brightness(1.1)}

    .log{
      margin-top:16px;
      background:#0f172a;
      border-radius:12px;
      padding:12px 14px;
      font-size:.7rem;
      font-family:monospace;
      color:#64748b;
      max-height:130px;
      overflow-y:auto
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="icon">⚡</div>
      <h1>AI App Factory</h1>
      <p>Daily Flutter apps — idea to APK automatically</p>
    </div>

    <div class="pipeline" id="pipeline">
      <div class="step" id="step-idea"><span class="dot"></span>Idea</div>
      <div class="step" id="step-code"><span class="dot"></span>Code</div>
      <div class="step" id="step-upload"><span class="dot"></span>GitHub</div>
      <div class="step" id="step-build"><span class="dot"></span>Build</div>
      <div class="step" id="step-email"><span class="dot"></span>Email</div>
    </div>

    <div class="output" id="output">
      <h3>📱 Latest App</h3>
      <p><strong>Name:</strong> <span id="out-name">-</span></p>
      <p><strong>Desc:</strong> <span id="out-desc">-</span></p>
      <p>🔗 <a href="#" target="_blank" id="out-github">GitHub</a> | 📦 <a href="#" target="_blank" id="out-apk">APK</a></p>
    </div>

    <button class="btn" id="btn" onclick="run()">🚀 Generate App</button>
    <div class="log" id="log">⚫ Ready</div>
  </div>

  <script>
    const API = window.location.origin;
    let timer = null;

    async function run() {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.innerHTML = '⏳ Running...';
      try{
        await fetch(API + '/run');
        poll();
      }catch(e){
        document.getElementById('log').innerHTML = '❌ Error: ' + e.message;
        btn.disabled = false;
        btn.innerHTML = '🚀 Generate App';
      }
    }

    async function poll() {
      try{
        const r = await fetch(API + '/status');
        const d = await r.json();
        
        const map = { idea:'idea', code:'code', github:'upload', build:'build', email:'email' };
        for(let key in map){
          const el = document.getElementById('step-' + map[key]);
          if(!el) continue;
          el.classList.remove('done','active');
          if(d[key]?.status === 'done') el.classList.add('done');
          if(d[key]?.status === 'running') el.classList.add('active');
        }

        if(d.app){
          document.getElementById('output').style.display = 'block';
          document.getElementById('out-name').textContent = d.app.name;
          document.getElementById('out-desc').textContent = d.app.desc;
          document.getElementById('out-github').href = d.app.githubUrl;
          document.getElementById('out-apk').href = d.app.apkUrl;
        }

        if(d.logs?.length){
          document.getElementById('log').innerHTML = d.logs
            .map(l => `[${new Date(l.time).toLocaleTimeString()}] ${l.message}`)
            .join('<br>');
        }

        if(!d.complete){
          timer = setTimeout(poll, 3000);
        }else{
          document.getElementById('btn').disabled = false;
          document.getElementById('btn').innerHTML = '🚀 Generate App';
        }
      }catch(e){}
    }

    poll();
  </script>
</body>
</html>
